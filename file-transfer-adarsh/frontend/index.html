<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cipher Demo: File Transfer</title>
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f8fafc;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --border: #334155;
            --success: #22c55e;
            --error: #ef4444;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', system-ui, sans-serif;
            margin: 0;
            padding: 2rem;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            max-width: 600px;
            width: 100%;
        }
        h1 {
            text-align: center;
            margin-bottom: 2rem;
            background: linear-gradient(to right, #3b82f6, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .card {
            background-color: var(--card-bg);
            border-radius: 1rem;
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            border: 1px solid var(--border);
        }
        .card h2 {
            margin-top: 0;
            font-size: 1.25rem;
            margin-bottom: 1rem;
        }
        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            cursor: pointer;
            font-weight: 600;
            transition: background-color 0.2s;
            text-decoration: none;
        }
        button:hover {
            background-color: var(--primary-hover);
        }
    </style>
</head>
<body>

<div class="container" id="mode-selection">
    <h1>Cipher File Transfer</h1>
    <div class="card" style="text-align: center;">
        <h2>Select Your Mode</h2>
        <div style="display: flex; gap: 1rem; justify-content: center; margin-top: 2rem;">
            <button onclick="window.location.href='sender.html'">I am a Sender 📤</button>
            <button onclick="window.location.href='receiver.html'">I am a Receiver 📥</button>
        </div>
    </div>
</div>

</body>
</html>
