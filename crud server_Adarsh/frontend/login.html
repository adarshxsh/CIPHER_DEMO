<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Cipher Task</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 350px; }
        h2 { margin-bottom: 20px; color: #333; text-align: center; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: #666; font-size: 14px; }
        input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #007bff; color: white; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; }
        button:hover { background: #0069d9; }
        .error { color: #dc3545; font-size: 14px; margin-top: 10px; text-align: center; display: none; }
        .footer { text-align: center; margin-top: 15px; font-size: 14px; }
        .footer a { color: #28a745; text-decoration: none; }
    </style>
</head>
<body>

<div class="card">
    <h2>Account Login</h2>
    <form id="loginForm">
        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" required>
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" required>
        </div>
        <button type="submit">Sign In</button>
        <div id="errorMsg" class="error"></div>
    </form>
    <div class="footer">
        New here? <a href="/register.html">Register an account</a>
    </div>
</div>

<script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const errorMsg = document.getElementById('errorMsg');
        errorMsg.style.display = 'none';

        const payload = {
            email: document.getElementById('email').value,
            pwd: document.getElementById('password').value // Matches Go `json:"pwd"` tag
        };

        try {
            // Sends data directly to your Go LoginUser handler
            const response = await fetch('/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (response.ok) {
                const data = await response.json();
                // Securely hold token for subsequent authorized API requests
                localStorage.setItem('token', data.token);
                alert('Login successful! Redirecting...');
                window.location.href = '/tasks'; 
            } else {
                const text = await response.text();
                errorMsg.innerText = text || 'Invalid email or password';
                errorMsg.style.display = 'block';
            }
        } catch (err) {
            errorMsg.innerText = 'Network error occurred';
            errorMsg.style.display = 'block';
        }
    });
</script>
</body>
</html>
