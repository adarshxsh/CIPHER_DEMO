<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Cipher Task</title>
    <style>
        :root {
            --bg-color: #f4f7f6;
            --card-bg: white;
            --border-color: #ddd;
            --text-primary: #333;
            --text-secondary: #666;
            --accent-primary: #007bff;
            --accent-hover: #0069d9;
            --danger: #dc3545;
            --danger-hover: #c82333;
            --success: #28a745;
            --warning: #ffc107;
        }

        body {
            font-family: Arial, sans-serif;
            background: var(--bg-color);
            color: var(--text-primary);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .container {
            max-width: 800px;
            margin: 40px auto;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #eee;
            padding-bottom: 15px;
            margin-bottom: 25px;
        }

        h2 {
            margin: 0;
            font-weight: bold;
            font-size: 24px;
            color: var(--text-primary);
        }

        .btn {
            padding: 10px 18px;
            border-radius: 4px;
            border: none;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: var(--accent-primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--accent-hover);
        }

        .btn-danger {
            background: var(--danger);
            color: white;
        }

        .btn-danger:hover {
            background: var(--danger-hover);
        }

        .btn-secondary {
            background: #f8f9fa;
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
        }

        .btn-secondary:hover {
            background: #e2e6ea;
            color: var(--text-primary);
        }

        /* Form Design */
        .task-form {
            display: flex;
            flex-direction: column;
            gap: 15px;
            background: #f8f9fa;
            padding: 20px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            margin-bottom: 30px;
        }

        .form-row {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .form-group {
            flex: 1;
            min-width: 200px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        label {
            font-size: 13px;
            color: var(--text-secondary);
            font-weight: bold;
        }

        input, select, textarea {
            background: white;
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 10px;
            border-radius: 4px;
            font-family: inherit;
            font-size: 14px;
            outline: none;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }

        input:focus, select:focus, textarea:focus {
            border-color: var(--accent-primary);
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        /* Task List */
        .task-list {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .task-item {
            background: #f9f9f9;
            padding: 20px;
            border-radius: 4px;
            border-left: 5px solid var(--accent-primary);
            border-top: 1px solid var(--border-color);
            border-right: 1px solid var(--border-color);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
            transition: background 0.2s;
        }

        .task-item:hover {
            background: #f1f1f1;
        }

        .task-info {
            flex: 1;
        }

        .task-info h3 {
            margin: 0 0 8px 0;
            font-size: 18px;
            font-weight: bold;
            color: #333;
        }

        .task-info p {
            margin: 0;
            color: var(--text-secondary);
            font-size: 14px;
            line-height: 1.5;
        }

        .task-meta {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .status {
            padding: 4px 10px;
            border-radius: 3px;
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .status-pending {
            background: #fff3cd;
            color: #856404;
            border: 1px solid #ffeeba;
        }

        .status-progress {
            background: #cce5ff;
            color: #004085;
            border: 1px solid #b8daff;
        }

        .status-completed {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .actions {
            display: flex;
            gap: 8px;
        }

        /* Modal styling */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .modal-content {
            background: white;
            border: 1px solid var(--border-color);
            padding: 30px;
            border-radius: 8px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            color: var(--text-primary);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-header h3 {
            margin: 0;
            font-size: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>Your Tasks Dashboard</h2>
        <button class="btn btn-danger" id="logoutBtn">Log Out</button>
    </div>

    <!-- Create Task Form -->
    <form id="createTaskForm" class="task-form">
        <h3 style="margin: 0 0 10px 0; font-size: 18px; font-weight: 500;">Create a New Task</h3>
        <div class="form-row">
            <div class="form-group" style="flex: 2;">
                <label for="title">Task Title</label>
                <input type="text" id="title" placeholder="Enter task title" required>
            </div>
            <div class="form-group" style="flex: 1;">
                <label for="status">Status</label>
                <select id="status">
                    <option value="Pending">Pending</option>
                    <option value="In Progress">In Progress</option>
                    <option value="Completed">Completed</option>
                </select>
            </div>
        </div>
        <div class="form-group">
            <label for="description">Description</label>
            <textarea id="description" placeholder="Write details about the task..." required></textarea>
        </div>
        <button type="submit" class="btn btn-primary" style="align-self: flex-start;">Add Task</button>
    </form>
    
    <ul class="task-list" id="taskList">
        <!-- Tasks inject dynamically here -->
    </ul>
</div>

<!-- Edit Task Modal -->
<div class="modal" id="editModal">
    <div class="modal-content">
        <div class="modal-header">
            <h3>Edit Task</h3>
            <button class="btn btn-secondary" onclick="closeEditModal()" style="padding: 5px 10px;">&times;</button>
        </div>
        <form id="editTaskForm" style="display: flex; flex-direction: column; gap: 15px;">
            <input type="hidden" id="editId">
            <div class="form-group">
                <label for="editTitle">Task Title</label>
                <input type="text" id="editTitle" required>
            </div>
            <div class="form-group">
                <label for="editStatus">Status</label>
                <select id="editStatus">
                    <option value="Pending">Pending</option>
                    <option value="In Progress">In Progress</option>
                    <option value="Completed">Completed</option>
                </select>
            </div>
            <div class="form-group">
                <label for="editDescription">Description</label>
                <textarea id="editDescription" required></textarea>
            </div>
            <div style="display: flex; justify-content: flex-end; gap: 10px; margin-top: 10px;">
                <button type="button" class="btn btn-secondary" onclick="closeEditModal()">Cancel</button>
                <button type="submit" class="btn btn-primary">Save Changes</button>
            </div>
        </form>
    </div>
</div>

<script>
    // Security Guard Check: Redirect to login immediately if token isn't present
    const token = localStorage.getItem('token');
    if (!token) {
        window.location.href = '/login';
    }

    // Attach Log Out logic routine
    document.getElementById('logoutBtn').addEventListener('click', () => {
        localStorage.removeItem('token');
        window.location.href = '/login';
    });

    // Helper: Map status to styling classes
    function getStatusClass(status) {
        const s = status.toLowerCase();
        if (s === 'completed') return 'status-completed';
        if (s === 'in progress') return 'status-progress';
        return 'status-pending';
    }

    // Fetch array data from Go protected endpoints
    async function loadTasks() {
        const listContainer = document.getElementById('taskList');
        try {
            const response = await fetch('/api/tasks', {
                method: 'GET',
                headers: { 
                    'Authorization': `Bearer ${token}`,
                    'Content-Type': 'application/json'
                }
            });

            if (response.status === 401) {
                // Token expired or invalid
                localStorage.removeItem('token');
                window.location.href = '/login';
                return;
            }

            const tasks = await response.json();
            if (!tasks || tasks.length === 0) {
                listContainer.innerHTML = '<li style="text-align:center; color:#94a3b8; list-style:none; padding: 20px;">No tasks found. Create one!</li>';
                return;
            }

            listContainer.innerHTML = tasks.map(task => `
                <li class="task-item" id="task-${task.id}">
                    <div class="task-info">
                        <h3>${task.title}</h3>
                        <p>${task.description}</p>
                    </div>
                    <div class="task-meta">
                        <span class="status ${getStatusClass(task.status)}">${task.status}</span>
                        <div class="actions">
                            <button class="btn btn-secondary" onclick='openEditModal(${JSON.stringify(task)})' style="padding: 6px 12px;">Edit</button>
                            <button class="btn btn-danger" onclick="deleteTask(${task.id})" style="padding: 6px 12px;">Delete</button>
                        </div>
                    </div>
                </li>
            `).join('');

        } catch (err) {
            listContainer.innerHTML = '<li style="text-align:center; color:#ef4444; list-style:none; padding: 20px;">Failed to load tasks data feed.</li>';
        }
    }

    // Create a new task
    document.getElementById('createTaskForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const titleInput = document.getElementById('title');
        const descriptionInput = document.getElementById('description');
        const statusInput = document.getElementById('status');

        const payload = {
            title: titleInput.value,
            description: descriptionInput.value,
            status: statusInput.value
        };

        try {
            const response = await fetch('/api/task', {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${token}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(payload)
            });

            if (response.ok) {
                titleInput.value = '';
                descriptionInput.value = '';
                statusInput.value = 'Pending';
                loadTasks();
            } else {
                alert('Failed to create task');
            }
        } catch (err) {
            alert('Error creating task');
        }
    });

    // Delete a task
    async function deleteTask(id) {
        if (!confirm('Are you sure you want to delete this task?')) return;

        try {
            const response = await fetch(`/api/task/${id}`, {
                method: 'DELETE',
                headers: {
                    'Authorization': `Bearer ${token}`
                }
            });

            if (response.ok || response.status === 204) {
                loadTasks();
            } else {
                alert('Failed to delete task');
            }
        } catch (err) {
            alert('Error deleting task');
        }
    }

    // Modal UI states
    const editModal = document.getElementById('editModal');
    
    function openEditModal(task) {
        document.getElementById('editId').value = task.id;
        document.getElementById('editTitle').value = task.title;
        document.getElementById('editDescription').value = task.description;
        document.getElementById('editStatus').value = task.status;
        editModal.style.display = 'flex';
    }

    function closeEditModal() {
        editModal.style.display = 'none';
    }

    // Update an existing task
    document.getElementById('editTaskForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const id = document.getElementById('editId').value;
        const payload = {
            title: document.getElementById('editTitle').value,
            description: document.getElementById('editDescription').value,
            status: document.getElementById('editStatus').value
        };

        try {
            const response = await fetch(`/api/task/${id}`, {
                method: 'PUT',
                headers: {
                    'Authorization': `Bearer ${token}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(payload)
            });

            if (response.ok) {
                closeEditModal();
                loadTasks();
            } else {
                alert('Failed to update task');
            }
        } catch (err) {
            alert('Error updating task');
        }
    });

    // Init loop context load execution trigger
    loadTasks();
</script>
</body>
</html>
